  <circle cx="32" cy="2" r="3" fill="#A82020"/>

  <!-- Head -->
  <rect x="12" y="12" width="40" height="30" rx="8" fill="#A82020"/>

  <!-- Ear nubs -->
  <rect x="6" y="19" width="6" height="11" rx="3" fill="#A82020"/>
  <rect x="52" y="19" width="6" height="11" rx="3" fill="#8B1A1A"/>

