  <rect x="27" y="49" width="4" height="9" rx="1" fill="#FAE8E8" opacity="0.75"/>
  <rect x="34" y="47" width="4" height="11" rx="1" fill="#FAE8E8" opacity="0.9"/>
  <rect x="41" y="50" width="4" height="8" rx="1" fill="#FAE8E8" opacity="0.6"/>
